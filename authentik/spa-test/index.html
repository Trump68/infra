<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Тест SPA — Authentik + Kong</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    button { padding: 0.5rem 1rem; margin-right: 0.5rem; margin-bottom: 0.5rem; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    pre { background: #f5f5f5; padding: 0.75rem; border-radius: 4px; overflow: auto; font-size: 0.85rem; }
    .error { color: #c00; }
    .ok { color: #060; }
    .muted { color: #666; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Тест SPA: Authentik → Kong → backend</h1>
  <p class="muted">Проверка входа через OAuth2 и вызова API через Kong с Bearer-токеном.</p>

  <div class="card">
    <p id="status">Не авторизован.</p>
    <button id="btnLogin" type="button">Войти через Authentik</button>
    <button id="btnApi" type="button" disabled>Вызвать API через Kong</button>
    <button id="btnLogout" type="button" style="visibility: hidden;">Выйти</button>
  </div>

  <div class="card">
    <strong>Ответ API:</strong>
    <pre id="apiResult">—</pre>
  </div>

  <script>
    (function () {
      const REDIRECT_URI = window.location.origin + '/callback';
      let config = { authentikUrl: '', clientId: '', kongUrl: '' };
      let accessToken = sessionStorage.getItem('access_token') || '';

      const statusEl = document.getElementById('status');
      const btnLogin = document.getElementById('btnLogin');
      const btnApi = document.getElementById('btnApi');
      const btnLogout = document.getElementById('btnLogout');
      const apiResult = document.getElementById('apiResult');

      function setStatus(text, isError) {
        statusEl.textContent = text;
        statusEl.className = isError ? 'error' : 'ok';
      }

      function loadConfig() {
        return fetch('/config').then(r => r.json()).then(c => { config = c; }).catch(() => {});
      }

      function updateUI() {
        if (accessToken) {
          setStatus('Авторизован. Токен получен.');
          btnLogin.disabled = true;
          btnApi.disabled = false;
          btnLogout.style.visibility = 'visible';
        } else {
          setStatus('Не авторизован.');
          btnLogin.disabled = false;
          btnApi.disabled = true;
          btnLogout.style.visibility = 'hidden';
        }
      }

      function handleCallback() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const path = window.location.pathname;
        if ((path === '/callback' || path === '/callback/') && code) {
          apiResult.textContent = 'Обмен code на токен...';
          fetch('/exchange', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code, redirect_uri: REDIRECT_URI })
          })
            .then(r => r.json())
            .then(data => {
              if (data.access_token) {
                accessToken = data.access_token;
                sessionStorage.setItem('access_token', accessToken);
                window.history.replaceState({}, '', '/');
                updateUI();
                apiResult.textContent = 'Токен получен. Нажмите «Вызвать API через Kong».';
              } else {
                apiResult.textContent = 'Ошибка: ' + JSON.stringify(data, null, 2);
                apiResult.classList.add('error');
              }
            })
            .catch(e => {
              apiResult.textContent = 'Ошибка запроса: ' + e.message;
              apiResult.classList.add('error');
            });
          return true;
        }
        return false;
      }

      btnLogin.addEventListener('click', function () {
        loadConfig().then(() => {
          const authUrl = config.authentikUrl + '/application/o/authorize/'
            + '?response_type=code'
            + '&client_id=' + encodeURIComponent(config.clientId)
            + '&redirect_uri=' + encodeURIComponent(REDIRECT_URI)
            + '&scope=openid';
          window.location.href = authUrl;
        });
      });

      btnApi.addEventListener('click', function () {
        if (!accessToken) return;
        apiResult.textContent = 'Запрос...';
        apiResult.classList.remove('error');
        fetch('/api/', {
          headers: { 'Authorization': 'Bearer ' + accessToken }
        })
          .then(r => {
            return r.text().then(t => ({ status: r.status, body: t }));
          })
          .then(({ status, body }) => {
            apiResult.textContent = 'HTTP ' + status + '\n\n' + body;
            if (status >= 400) apiResult.classList.add('error');
          })
          .catch(e => {
            apiResult.textContent = 'Ошибка: ' + e.message;
            apiResult.classList.add('error');
          });
      });

      btnLogout.addEventListener('click', function () {
        accessToken = '';
        sessionStorage.removeItem('access_token');
        updateUI();
        apiResult.textContent = '—';
        apiResult.classList.remove('error');
      });

      loadConfig().then(() => {
        if (!handleCallback()) {
          updateUI();
        }
      });
    })();
  </script>
</body>
</html>
