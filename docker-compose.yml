# Farmadoc: Milvus, vLLM, IAM (Authentik + Kong + BFF/frontend + backend)
# Milvus + Attu (GUI) + vLLM (эмбеддинги) + Kong + Authentik + backend upstream
# Attu: http://localhost:8080 → подключается к milvus:19530
# n8n: milvus — host=milvus:19530, vLLM — host=vllm_emb:800
# IAM: конфиг и скрипты в iam/ (authentik, kong, frontend, backend), документация — iam/docs/
# API: Kong :8001/:8444 → backend; BFF (iam/frontend) :3000 → SPA + прокси /api → Kong
# Authentik: https://version-2026-2.goauthentik.io/install-config/install/docker-compose/
services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.11
    container_name: milvus-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - farmadoc-network

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data
    # healthcheck убран: в образе нет curl/wget; Milvus переподключается к MinIO при старте
    networks:
      - farmadoc-network

  milvus:
    image: milvusdb/milvus:v2.6.11
    container_name: milvus-standalone
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"   # gRPC — основной порт для клиентов (n8n, SDK)
      - "9091:9091"     # metrics (опционально)
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - farmadoc-network

  attu:
    image: zilliz/attu:v2.6.3
    container_name: attu
    restart: unless-stopped
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "8080:3000"
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - farmadoc-network

  vllm_emb:
    image: vllm/vllm-openai:v0.17.0
    container_name: vllm_emb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    command: Qwen/Qwen3-Embedding-0.6B --gpu-memory-utilization 0.6
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - farmadoc-network

  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - farmadoc-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - farmadoc-network

  # Authentik (OIDC/OAuth2 IdP) — по https://version-2026-2.goauthentik.io/install-config/install/docker-compose/
  # Секреты PG_PASS и AUTHENTIK_SECRET_KEY: из .env или из .env.vault (создаётся скриптом iam/authentik/scripts/run-authentik-with-vault.sh).
  authentik-postgresql:
    image: postgres:16-alpine
    container_name: authentik-postgresql
    restart: unless-stopped
    env_file:
      - .env
      - .env.vault
    environment:
      POSTGRES_PASSWORD: ${PG_PASS:?PG_PASS required for Authentik}
      POSTGRES_USER: ${PG_USER:-authentik}
      POSTGRES_DB: ${PG_DB:-authentik}
    volumes:
      - authentik_database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    networks:
      - farmadoc-network

  authentik-redis:
    image: redis:alpine
    container_name: authentik-redis
    command: --save 60 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - authentik_redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    networks:
      - farmadoc-network

  authentik-server:
    image: ghcr.io/goauthentik/server:2026.2
    container_name: authentik-server
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?AUTHENTIK_SECRET_KEY required}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    env_file:
      - .env
      - .env.vault
    ports:
      - "${COMPOSE_PORT_HTTP:-9000}:9000"
      - "${COMPOSE_PORT_HTTPS:-9443}:9443"
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    networks:
      - farmadoc-network

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.2
    container_name: authentik-worker
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
      # Опционально: для автоматического развёртывания Outposts. Иначе — ручное развёртывание outposts.
      # - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
      - .env.vault
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    networks:
      - farmadoc-network

  # Placeholder для цепочки Kong → backend; конфиг: iam/backend/nginx.conf. Свой API: укажите URL в iam/kong/kong.yml
  backend:
    image: nginx:alpine
    container_name: backend
    restart: unless-stopped
    volumes:
      - ./iam/backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - farmadoc-network

  # API Gateway: JWT (Authentik), прокси на backend. Конфиг: iam/kong/kong.yml. См. iam/docs/kong.md
  kong:
    image: kong:3.7
    container_name: kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    volumes:
      - ./iam/kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8001:8000"   # proxy HTTP (внешний 8001, т.к. 8000 занят vLLM)
      - "8444:8443"   # proxy HTTPS
    depends_on:
      - backend
    networks:
      - farmadoc-network

  # HashiCorp Vault — хранилище секретов (Authentik: PG_PASS, AUTHENTIK_SECRET_KEY). Режим dev — только для разработки/тестов; в проде — production mode. См. iam/docs/vault.md
  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    networks:
      - farmadoc-network

  # BFF: SPA из iam/frontend — статика, /config.json, /auth/exchange, прокси /api → Kong. См. iam/docs/
  bff:
    build: ./iam/frontend
    container_name: bff
    restart: unless-stopped
    environment:
      PORT: "3000"
      # Публичные URL для браузера (задайте в .env при доступе по IP)
      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-http://localhost:9000/application/o/farmadoc-app/.well-known/openid-configuration/}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:3000/callback}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_APP_SLUG: ${OIDC_APP_SLUG:-farmadoc-app}
      # При 404 укажите точный внутренний URL (например другой slug): OIDC_DISCOVERY_INTERNAL_URL=http://authentik-server:9000/application/o/ВАШ_SLUG/.well-known/openid-configuration/
      OIDC_DISCOVERY_INTERNAL_URL: ${OIDC_DISCOVERY_INTERNAL_URL:-}
      # Внутри сети: BFF → Authentik (token), BFF → Kong (/api)
      AUTHENTIK_INTERNAL_BASE_URL: "http://authentik-server:9000"
      KONG_INTERNAL_URL: "http://kong:8000"
      KONG_API_BASE_URL: ""
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - kong
      - authentik-server
    networks:
      - farmadoc-network

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  vllm_cache:
  postgres_data:
  authentik_database:
  authentik_redis:
  authentik_media:
  authentik_templates:

networks:
  farmadoc-network:
    name: farmadoc-network
    driver: bridge
