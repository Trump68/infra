# Milvus + vLLM (эмбеддинги и др. модели с Hugging Face)
# n8n: milvus — host=milvus:19530, vLLM — host=vllm:8000

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.11
    container_name: milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - milvus

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data
    # healthcheck убран: в образе нет curl/wget; Milvus переподключается к MinIO при старте
    networks:
      - milvus

  milvus:
    image: milvusdb/milvus:v2.6.11
    container_name: milvus-standalone
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"   # gRPC — основной порт для клиентов (n8n, SDK)
      - "9091:9091"     # metrics (опционально)
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - milvus

  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    # Модель из .env (VLLM_MODEL), по умолчанию — эмбеддинг BGE small. Для gated-моделей: HF_TOKEN
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command: ["--model", "${VLLM_MODEL:-BAAI/bge-small-en-v1.5}"]
    volumes:
      - vllm_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    # Нужно для инференса (GPU или большой CPU)
    shm_size: "2gb"
    # Раскомментировать для GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - milvus

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  vllm_cache:

networks:
  milvus:
    name: milvus-network
    driver: bridge
